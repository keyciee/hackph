<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HackPH — The Philippines is Waking Up</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:  #00ff88;
  --gdim:   #00552e;
  --cyan:   #00cfff;
  --bg:     #04060c;
  --text:   #8aa0b0;
  --muted:  #1e3040;
}

html, body { height: 100%; background: var(--bg); overflow: hidden; }

/* ── CANVAS ── */
#c { position: fixed; inset: 0; z-index: 0; }

/* ── NOISE OVERLAY ── */
.noise {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ── SCANLINES ── */
.scan {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
  );
}

/* ── PH FLAG STRIPE ── */
.flag {
  position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 20;
  background: linear-gradient(90deg, #0038a8 33.3%, #ce1127 33.3% 66.6%, #fcd116 66.6%);
}

/* ── CORNER BRACKETS ── */
.corner {
  position: fixed; z-index: 5; width: 28px; height: 28px;
  opacity: 0; animation: fadeIn 0.5s ease 2s forwards;
}
.corner svg { width: 100%; height: 100%; }
.tl { top: 18px; left: 18px; }
.tr { top: 18px; right: 18px; transform: scaleX(-1); }
.bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
.br { bottom: 18px; right: 18px; transform: scale(-1); }

/* ── MAIN ── */
main {
  position: relative; z-index: 10;
  height: 100vh;
  display: grid;
  place-items: center;
  padding: 2rem;
}

.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  max-width: 860px;
  width: 100%;
}

/* ── GLITCH TITLE ── */
.big-title {
  position: relative;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(7rem, 22vw, 16rem);
  line-height: 0.82;
  letter-spacing: 0.06em;
  user-select: none;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
  margin-bottom: 0.15em;
}

.big-title .word-hack {
  display: block;
  color: #fff;
  position: relative;
}

.big-title .word-ph {
  display: block;
  color: var(--green);
  position: relative;
  text-shadow:
    0 0 60px rgba(0,255,136,0.2),
    0 0 120px rgba(0,255,136,0.1);
}

/* glitch effect on .word-ph */
.big-title .word-ph::before,
.big-title .word-ph::after {
  content: 'PH';
  position: absolute;
  inset: 0;
  color: var(--green);
  clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
}
.big-title .word-ph::before {
  color: var(--cyan);
  animation: glitch1 4s infinite step-end;
}
.big-title .word-ph::after {
  color: #ff3366;
  clip-path: polygon(0 55%, 100% 55%, 100% 75%, 0 75%);
  animation: glitch2 4s infinite step-end;
}

@keyframes glitch1 {
  0%,94%,100% { transform: none; opacity: 0; }
  95% { transform: translate(-4px, 2px); opacity: 0.7; }
  97% { transform: translate(3px, -1px); opacity: 0.5; }
}
@keyframes glitch2 {
  0%,91%,100% { transform: none; opacity: 0; }
  92% { transform: translate(5px, 1px); opacity: 0.6; }
  94% { transform: translate(-3px, 2px); opacity: 0.4; }
}

/* ── STATEMENT ── */
.statement {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: clamp(1rem, 2.2vw, 1.25rem);
  line-height: 1.75;
  color: #3d5568;
  max-width: 560px;
  margin-bottom: 2.8rem;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.7s forwards;
}

.statement .line { display: block; }

.statement .line-1 { color: #5a7a8a; }
.statement .line-2 { color: #4a6878; }
.statement .line-3 {
  color: #8ab0c0;
  font-style: italic;
  margin-top: 0.4em;
}
.statement .accent { color: var(--green); font-style: normal; }

/* ── DIVIDER ── */
.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  width: 100%;
  max-width: 400px;
  margin-bottom: 2.2rem;
  opacity: 0;
  animation: fadeUp 0.6s ease 1.1s forwards;
}

.divider-line { flex: 1; height: 1px; background: var(--muted); }
.divider-icon { opacity: 0.5; }

/* ── LAUNCHING SOON ── */
.launch-line {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--green);
  opacity: 0;
  animation: fadeUp 0.5s ease 1.3s forwards;
  display: flex;
  align-items: center;
  gap: 14px;
}

.launch-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.5); }
  50%      { box-shadow: 0 0 0 7px rgba(0,255,136,0); }
}

/* ── BOTTOM TAGLINE ── */
.bottom-tag {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  color: var(--muted);
  text-transform: uppercase;
  white-space: nowrap;
  opacity: 0;
  animation: fadeIn 0.5s ease 2.2s forwards;
}

/* ── SIDE TEXT ── */
.side-text {
  position: fixed;
  z-index: 10;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.5s ease 2s forwards;
}

.side-left {
  left: 22px; top: 50%;
  transform: translateY(-50%) rotate(-90deg);
  transform-origin: center center;
}
.side-right {
  right: 22px; top: 50%;
  transform: translateY(-50%) rotate(90deg);
  transform-origin: center center;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}

/* ── RESPONSIVE ── */
@media (max-width: 500px) {
  .side-left, .side-right, .corner { display: none; }
}
</style>
</head>
<body>

<div class="flag"></div>
<canvas id="c"></canvas>
<div class="noise"></div>
<div class="scan"></div>

<!-- corner brackets -->
<div class="corner tl"><svg viewBox="0 0 28 28" fill="none"><path d="M1 14V1H14" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.4"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 28 28" fill="none"><path d="M1 14V1H14" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.4"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 28 28" fill="none"><path d="M1 14V1H14" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.4"/></svg></div>
<div class="corner br"><svg viewBox="0 0 28 28" fill="none"><path d="M1 14V1H14" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.4"/></svg></div>

<!-- side labels -->
<div class="side-text side-left">Pilipinas · Cybersecurity · Community</div>
<div class="side-text side-right">hackph.com · Est. 2025</div>

<main>
  <div class="center">

    <div class="big-title">
      <span class="word-hack">Hack</span>
      <span class="word-ph">PH</span>
    </div>

    <p class="statement">
      <span class="line line-1">The Philippines has 120 million people.</span>
      <span class="line line-2">Thousands of engineers. Millions of devices.</span>
      <span class="line line-3">And almost <span class="accent">no one</span> teaching us how to defend them.</span>
    </p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <polygon points="8,1 15,5 15,11 8,15 1,11 1,5" stroke="#00ff88" stroke-width="1" fill="none" opacity="0.5"/>
          <circle cx="8" cy="8" r="2" fill="#00ff88" opacity="0.4"/>
        </svg>
      </div>
      <div class="divider-line"></div>
    </div>

    <div class="launch-line">
      <span class="launch-dot"></span>
      Launching Soon
      <span class="launch-dot"></span>
    </div>

  </div>
</main>

<div class="bottom-tag">The Philippines' Home for Ethical Hacking</div>

<script>
// ── PARTICLE + MATRIX HYBRID CANVAS ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cols, drops, particles;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initMatrix();
}

// Matrix rain
const chars = '01アイウエオカキクHACKPH</>{}[]|\\'.split('');
const FS = 14;

function initMatrix() {
  cols  = Math.floor(W / FS);
  drops = Array.from({length: cols}, () => Math.random() * -(H / FS));
}

function drawMatrix() {
  ctx.fillStyle = 'rgba(4,6,12,0.055)';
  ctx.fillRect(0, 0, W, H);

  ctx.font = `${FS}px 'Share Tech Mono', monospace`;

  for (let i = 0; i < cols; i++) {
    const y = drops[i] * FS;
    const frac = drops[i] / (H / FS);
    const alpha = Math.max(0.03, 0.4 - frac * 0.38);
    const isHead = Math.random() > 0.97;

    ctx.fillStyle = isHead ? 'rgba(255,255,255,0.9)' : `rgba(0,255,136,${alpha})`;
    ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * FS, y);

    if (y > H && Math.random() > 0.977) drops[i] = 0;
    drops[i] += 0.3;
  }
}

// Floating hex nodes
class Node {
  constructor() { this.reset(true); }
  reset(init) {
    this.x  = Math.random() * W;
    this.y  = init ? Math.random() * H : H + 20;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = -(Math.random() * 0.4 + 0.1);
    this.r  = Math.random() * 18 + 8;
    this.a  = Math.random() * 0.25 + 0.04;
    this.rot = Math.random() * Math.PI;
    this.vr = (Math.random() - 0.5) * 0.003;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.rot += this.vr;
    if (this.y < -40) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i - Math.PI / 6;
      const x = Math.cos(a) * this.r, y = Math.sin(a) * this.r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(0,255,136,${this.a})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  }
}

particles = Array.from({length: 22}, () => new Node());

function loop() {
  drawMatrix();
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(loop);
}

resize();
window.addEventListener('resize', resize);
loop();
</script>
</body>
</html>
